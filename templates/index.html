{% extends "base.html" %}

{% block content %}

    <h1>Users</h1>

    <div class="user-list">
        {% for user in users %}
            <div class="user-card">
                <h2>{{ user.name }}</h2>

                <a href="{{ url_for('user_movies', user_id=user.id) }}" class="btn">
                    View Movies
                </a>

                <form action="{{ url_for('delete_user', user_id=user.id) }}" method="post">
                    <button type="submit"
                            class="btn delete-btn"
                            onclick="return confirm('Are you sure you want to delete this user?')">
                        Delete User
                    </button>
                </form>

            </div>
        {% endfor %}
    </div>

    <div class="form-card">
        <h2>Add New User</h2>

        <form action="{{ url_for('add_user') }}" method="post" class="user-form">
            <input
                    type="text"
                    name="name"
                    placeholder="User name"
                    autocomplete="name"
                    required
            >

            <button type="submit" class="btn">
                Add User
            </button>
        </form>
    </div>

{% endblock %}
