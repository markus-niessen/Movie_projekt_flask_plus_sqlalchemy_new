{% extends "base.html" %}

{% block content %}

<h1>Users</h1>

<ul class="user-list">
    {% for user in users %}
    <li class="user-entry">
        <a href="{{ url_for('user_movies', user_id=user.id) }}" class="btn">
            {{ user.name }}
        </a>
    </li>
    {% endfor %}
</ul>

<h2>Add User</h2>

<form action="{{ url_for('add_user') }}" method="post" class="user-form">
    <input
        type="text"
        name="name"
        placeholder="Enter user name"
        required
    >

    <button type="submit" class="btn">
        Add User
    </button>
</form>

{% endblock %}
