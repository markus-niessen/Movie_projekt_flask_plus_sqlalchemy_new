{% extends "base.html" %}

{% block content %}

<a href="{{ url_for('home') }}" class="back-link">
    ← Back to Users
</a>

<h1>Movies for {{ user.name }}</h1>

<div class="movie-list">

    {% for movie in movies %}
    <div class="movie-card">

        <img src="{{ movie.poster_url }}" alt="{{ movie.name }}">

        <h3>{{ movie.name }}</h3>

        <form
            action="{{ url_for('update_movie', user_id=user_id, movie_id=movie.id) }}"
            method="post"
            class="update-form"
        >
            <input
                type="text"
                name="name"
                placeholder="New movie title"
                required
            >

            <button type="submit" class="btn">
                Update
            </button>
        </form>

        <p><strong>Year:</strong> {{ movie.year }}</p>
        <p><strong>Director:</strong> {{ movie.director }}</p>

        <form
            action="{{ url_for('delete_movie', user_id=user_id, movie_id=movie.id) }}"
            method="post"
        >
            <button type="submit" class="btn delete-btn">
                Delete
            </button>
        </form>

    </div>
    {% endfor %}

</div>

<div class="form-card">

    <h2>Add New Movie</h2>

    <form
        action="{{ url_for('user_movies', user_id=user_id) }}"
        method="post"
        class="movie-form"
    >

        <input type="text" name="name" placeholder="Movie title" required>
        <input type="text" name="director" placeholder="Director" required>
        <input type="number" name="year" placeholder="Release year" required>
        <input type="url" name="poster_url" placeholder="Poster URL" required>

        <button type="submit" class="btn">
            Add Movie
        </button>

    </form>

</div>

{% endblock %}
